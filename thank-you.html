<head>

<title>תודה! — Studios</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:#0A0A0F;color:#F0F0F5;min-height:100vh;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;direction:rtl;position:relative}
:root{--accent:#C8FF00}
body::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:rgba(200,255,0,.06);filter:blur(120px);top:-100px;right:-100px;pointer-events:none}
body::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(200,255,0,.04);filter:blur(100px);bottom:-80px;left:-80px;pointer-events:none}

.card{max-width:480px;width:100%;text-align:center;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}

.check{width:72px;height:72px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;margin-bottom:28px;animation:popIn .6s cubic-bezier(.22,1,.36,1)}
.check svg{width:36px;height:36px;stroke:#0A0A0F;stroke-width:3;fill:none}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}

/* Progress */
.steps{display:flex;align-items:center;gap:0;margin-bottom:36px;width:100%;max-width:360px;justify-content:center}
.step-badge{display:flex;flex-direction:column;align-items:center;gap:6px;flex:0 0 auto}
.step-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem}
.step-num.done{background:var(--accent);color:#0A0A0F}
.step-num.current{background:rgba(200,255,0,.15);color:var(--accent);border:2px solid var(--accent)}
.step-num.later{background:rgba(255,255,255,.06);color:#555}
.step-text{font-size:.68rem;color:#8888AA;font-weight:600;white-space:nowrap}
.step-badge.active .step-text{color:var(--accent)}
.step-line{flex:1;height:2px;background:rgba(255,255,255,.08);min-width:28px;margin:0 6px;margin-bottom:18px}
.step-line.done-line{background:var(--accent)}

h1{font-size:clamp(1.5rem,5vw,2.2rem);font-weight:900;letter-spacing:-.03em;margin-bottom:14px;line-height:1.2}
h1 span{color:var(--accent)}
.sub{color:#8888AA;font-size:.92rem;line-height:1.7;margin-bottom:32px;max-width:400px}

.cta-main{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--accent);color:#0A0A0F;padding:16px 36px;border-radius:10px;font-family:'Heebo';font-weight:800;font-size:1.05rem;text-decoration:none;transition:transform .25s,box-shadow .25s;width:100%;max-width:360px;animation:pulse 2.5s ease-in-out infinite}
.cta-main:hover{transform:scale(1.04);box-shadow:0 8px 32px rgba(200,255,0,.4)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(200,255,0,.3)}50%{box-shadow:0 0 0 12px rgba(200,255,0,0)}}

.divider{display:flex;align-items:center;gap:14px;margin:24px 0;color:#555;font-size:.78rem;width:100%;max-width:360px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}

.wa-link{display:flex;align-items:center;justify-content:center;gap:10px;background:#25D366;color:#fff;padding:14px 28px;border-radius:10px;font-family:'Heebo';font-weight:700;font-size:.92rem;text-decoration:none;transition:transform .2s,box-shadow .2s;width:100%;max-width:360px}
.wa-link:hover{transform:scale(1.04);box-shadow:0 6px 24px rgba(37,211,102,.35)}
.wa-link svg{width:20px;height:20px;fill:#fff;flex-shrink:0}

/* REPLACE: cal-link — כפתור קביעת פגישה -->  */
.cal-link{display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#F0F0F5;padding:14px 28px;border-radius:10px;font-family:'Heebo';font-weight:600;font-size:.92rem;text-decoration:none;transition:all .25s;width:100%;max-width:360px;margin-top:12px}
.cal-link:hover{border-color:var(--accent);color:var(--accent);background:rgba(200,255,0,.06)}

.back{margin-top:32px;color:#555;font-size:.82rem;text-decoration:none;transition:color .2s}
.back:hover{color:var(--accent)}
</style>
</head>
